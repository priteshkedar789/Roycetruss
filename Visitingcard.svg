    <circle cx="0" cy="60" r="5" fill="#06b6d4" />
    <circle cx="0" cy="120" r="5" fill="#f97316" />
    <circle cx="60" cy="0" r="4" fill="#06b6d4" />
    <circle cx="80" cy="30" r="4" fill="#06b6d4" />
